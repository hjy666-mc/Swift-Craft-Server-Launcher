name: Build macOS DMG

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version info
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            MARKETING_VERSION="$VERSION"
          else
            VERSION="BETA"
            MARKETING_VERSION="BETA"
          fi

          # 清理版本号中的无效字符（用于文件名和 artifact 名称）
          SAFE_VERSION=$(echo "$VERSION" | sed 's/["<>|*?:\\\/\r\n]//g')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "safe_version=$SAFE_VERSION" >> $GITHUB_OUTPUT
          echo "marketing_version=$MARKETING_VERSION" >> $GITHUB_OUTPUT

      - name: Build app for ${{ matrix.arch }}
        run: |
          BUILD_DIR="build_${{ matrix.arch }}"
          ARCHIVE_PATH="$BUILD_DIR/SwiftCraftServerLauncher.xcarchive"

          # 设置要排除的架构（排除非目标架构）
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            EXCLUDED_ARCHS="x86_64"
          else
            EXCLUDED_ARCHS="arm64"
          fi

          xcodebuild -project SwiftCraftServerLauncher.xcodeproj \
            -scheme SwiftCraftLauncher \
            -configuration Release \
            -destination "platform=macOS,arch=${{ matrix.arch }}" \
            -derivedDataPath "$BUILD_DIR" \
            -archivePath "$ARCHIVE_PATH" \
            -skipPackagePluginValidation \
            EXCLUDED_ARCHS="$EXCLUDED_ARCHS" \
            archive

      - name: Add HelpBook config to generated Info.plist
        run: |
          ARCHIVE_PATH="build_${{ matrix.arch }}/SwiftCraftServerLauncher.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/SwiftCraftServerLauncher.app"
          INFO_PLIST_PATH="$APP_PATH/Contents/Info.plist"

          if [[ ! -f "$INFO_PLIST_PATH" ]]; then
            echo "❌ 未找到生成的 Info.plist: $INFO_PLIST_PATH"
            exit 1
          fi

          echo "📝 向生成的 Info.plist 添加 HelpBook 配置..."
          /usr/libexec/PlistBuddy -c "Add :CFBundleHelpBookFolder string SwiftCraftServerLauncher.help" "$INFO_PLIST_PATH" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleHelpBookFolder SwiftCraftServerLauncher.help" "$INFO_PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :CFBundleHelpBookName string com.su.code.SwiftCraftServerLauncher.help" "$INFO_PLIST_PATH" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleHelpBookName com.su.code.SwiftCraftServerLauncher.help" "$INFO_PLIST_PATH"

          echo "✅ HelpBook 配置已添加到生成的 Info.plist"

      - name: Verify build output
        run: |
          ARCHIVE_PATH="build_${{ matrix.arch }}/SwiftCraftServerLauncher.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/SwiftCraftServerLauncher.app"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "❌ 未找到构建产物: $APP_PATH"
            exit 1
          fi
          echo "✅ 应用构建成功: $APP_PATH"
          file "$APP_PATH/Contents/MacOS/SwiftCraftServerLauncher"

      - name: Process app with archify
        run: |
          ARCHIVE_PATH="build_${{ matrix.arch }}/SwiftCraftServerLauncher.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/SwiftCraftServerLauncher.app"
          PROCESSED_DIR="processed_app_${{ matrix.arch }}"

          echo "🔧 开始使用 archify 处理应用..."
          echo "原始应用路径: $APP_PATH"
          echo "目标架构: ${{ matrix.arch }}"
          echo "输出目录: $PROCESSED_DIR"

          # Verify app exists
          if [[ ! -d "$APP_PATH" ]]; then
            echo "❌ 应用不存在: $APP_PATH"
            exit 1
          fi

          # Create output directory
          mkdir -p "$PROCESSED_DIR"

          # Show archify help for debugging
          echo "📋 archify 帮助信息:"
          python3 .github/scripts/archify.py --help | head -20

          # Process app with archify
          echo "🚀 执行 archify 命令..."
          python3 .github/scripts/archify.py \
            -app "$APP_PATH" \
            -o "$PROCESSED_DIR" \
            -arch "${{ matrix.arch }}" \
            --codesign \
            -l

          # Check if processing was successful
          PROCESSED_APP="$PROCESSED_DIR/SwiftCraftServerLauncher.app"
          if [[ -d "$PROCESSED_APP" ]]; then
            echo "✅ archify 处理成功"
            echo "处理后的应用路径: $PROCESSED_APP"

            # Show file info for comparison
            echo "原始应用大小:"
            du -sh "$APP_PATH"
            echo "处理后应用大小:"
            du -sh "$PROCESSED_APP"

            # Replace original app with processed app
            rm -rf "$APP_PATH"
            cp -R "$PROCESSED_APP" "$APP_PATH"
            echo "✅ 已用处理后的应用替换原始应用"
          else
            echo "❌ archify 处理失败，使用原始应用"
            echo "检查输出目录内容:"
            ls -la "$PROCESSED_DIR" || echo "输出目录不存在"
          fi

      - name: Install create-dmg
        run: |
          # Install create-dmg using Homebrew
          brew install create-dmg

          # Verify installation
          create-dmg --version

      - name: Prepare DMG assets
        run: |
          # Create background image directory
          mkdir -p dmg_background

          # Copy app icon for volume icon
          cp "SwiftCraftServerLauncher/Assets.xcassets/AppIcon.appiconset/mac512pt2x.png" "dmg_background/volume_icon.png"

          # Copy the existing background image (assuming it's in the project root)
          if [[ -f "dmg_background@2x.png" ]]; then
            cp "dmg_background@2x.png" "dmg_background/background@2x.png"
          elif [[ -f ".github/assets/dmg/dmg_background@2x.png" ]]; then
            cp ".github/assets/dmg/dmg_background@2x.png" "dmg_background/background@2x.png"
          else
            echo "⚠️  未找到背景图片，将使用默认背景"
            # Fallback: use app icon as background
            cp "SwiftCraftServerLauncher/Assets.xcassets/AppIcon.appiconset/mac512pt2x.png" "dmg_background/background@2x.png"
          fi

          echo "✅ DMG assets prepared"

      - name: Create DMG
        id: create_dmg
        run: |
          ARCHIVE_PATH="build_${{ matrix.arch }}/SwiftCraftServerLauncher.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/SwiftCraftServerLauncher.app"
          DMG_DIR="dmg_temp_${{ matrix.arch }}"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"

          DMG_NAME="SwiftCraftServerLauncher-${{ matrix.arch }}.dmg"

          # Use create-dmg for professional DMG creation
          create-dmg \
            --volname "SwiftCraftServerLauncher" \
            --volicon "dmg_background/volume_icon.png" \
            --background "dmg_background/background@2x.png" \
            --window-pos 200 120 \
            --window-size 600 430 \
            --icon-size 64 \
            --icon "SwiftCraftServerLauncher.app" 150 180 \
            --app-drop-link 450 180 \
            --hide-extension "SwiftCraftServerLauncher.app" \
            --text-size 12 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$DMG_DIR"

          if [[ -f "$DMG_NAME" ]]; then
            echo "✅ DMG 创建成功: $DMG_NAME"
            # Show DMG info
            hdiutil info "$DMG_NAME" | head -20
            echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
          else
            echo "❌ DMG 创建失败"
            exit 1
          fi

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftCraftServerLauncher-${{ matrix.arch }}
          path: SwiftCraftServerLauncher-${{ matrix.arch }}.dmg
          retention-days: 30

      - name: Clean up
        if: always()
        run: |
          rm -rf build_${{ matrix.arch }}
          rm -rf dmg_temp_${{ matrix.arch }}
          rm -rf dmg_background
          rm -f SwiftCraftServerLauncher-${{ matrix.arch }}.dmg
          rm -rf processed_app_${{ matrix.arch }}

  prepare-sparkle-metadata:
    if: github.event_name == 'release'
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secret
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "❌ Missing secret: SPARKLE_PRIVATE_KEY"
            exit 1
          fi

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Download DMGs from release assets
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$REPOSITORY" \
            --pattern "*.dmg" \
            --dir release-assets
          ls -lah release-assets

      - name: Resolve architecture DMGs
        id: dmgs
        run: |
          ARM_DMG=$(find release-assets -maxdepth 1 -type f -name "*.dmg" | grep -E 'arm64' | head -n 1 || true)
          X86_DMG=$(find release-assets -maxdepth 1 -type f -name "*.dmg" | grep -E 'x86_64|x64|intel' | head -n 1 || true)

          if [[ -z "$ARM_DMG" || -z "$X86_DMG" ]]; then
            echo "❌ 发布资产里必须包含 arm64 和 x86_64 两个 DMG"
            echo "当前资产列表："
            find release-assets -maxdepth 1 -type f -name "*.dmg" -print
            exit 1
          fi

          echo "arm_dmg=$ARM_DMG" >> "$GITHUB_OUTPUT"
          echo "x86_dmg=$X86_DMG" >> "$GITHUB_OUTPUT"

      - name: Install Sparkle generate_appcast tool
        id: sparkle_tool
        run: |
          SPARKLE_VERSION="2.9.0"
          WORK_DIR="$(mktemp -d)"
          ARCHIVE_PATH="${WORK_DIR}/Sparkle.tar.xz"
          curl -fL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$ARCHIVE_PATH"
          tar -xf "$ARCHIVE_PATH" -C "$WORK_DIR"

          TOOL_PATH="$(find "$WORK_DIR" -type f -path '*/bin/generate_appcast' | head -n 1)"
          if [[ ! -x "$TOOL_PATH" ]]; then
            echo "❌ generate_appcast not found after extraction."
            find "$WORK_DIR" -maxdepth 3 -type f -print
            exit 1
          fi

          echo "tool_path=$TOOL_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from feat/fix commits
        env:
          TAG: ${{ github.event.release.tag_name }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          mkdir -p output/changelog

          PREV_TAG=$(git tag --sort=-creatordate | grep -Fxv "$TAG" | head -n 1 || true)
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
            RANGE_TEXT="${PREV_TAG} -> ${TAG}"
          else
            RANGE="$TAG"
            RANGE_TEXT="初始发布 -> ${TAG}"
          fi

          git log --pretty=format:'%s (%h)' "$RANGE" > /tmp/all_commits.txt || true
          grep -E '^(feat|fix)(\([^)]+\))?!?: ' /tmp/all_commits.txt > /tmp/feat_fix_commits.txt || true

          {
            echo "# ${TAG}"
            echo
            echo "- 发布日期: ${PUBLISHED_AT}"
            echo "- 提交范围: ${RANGE_TEXT}"
            echo
            echo "## 更新日志（feat / fix）"
            if [[ -s /tmp/feat_fix_commits.txt ]]; then
              sed 's/^/- /' /tmp/feat_fix_commits.txt
            else
              echo "- 本次没有匹配到 feat/fix 提交"
            fi
          } > "output/changelog/${TAG}.md"

          cp "output/changelog/${TAG}.md" output/changelog/latest.md

      - name: Generate architecture appcasts
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GENERATE_APPCAST_BIN: ${{ steps.sparkle_tool.outputs.tool_path }}
          ARM_DMG: ${{ steps.dmgs.outputs.arm_dmg }}
          X86_DMG: ${{ steps.dmgs.outputs.x86_dmg }}
        run: |
          mkdir -p output/archives/arm64 output/archives/x86_64 output/release-notes/"$TAG"

          cp "$ARM_DMG" output/archives/arm64/
          cp "$X86_DMG" output/archives/x86_64/

          ARM_DMG_NAME=$(basename "$ARM_DMG")
          X86_DMG_NAME=$(basename "$X86_DMG")

          cp "output/changelog/${TAG}.md" "output/archives/arm64/${ARM_DMG_NAME%.dmg}.md"
          cp "output/changelog/${TAG}.md" "output/archives/x86_64/${X86_DMG_NAME%.dmg}.md"

          DOWNLOAD_URL_PREFIX="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          RELEASE_NOTES_URL_PREFIX="https://${REPOSITORY_OWNER}.github.io/${REPO_NAME}/release-notes/${TAG}"

          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST_BIN" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
            --release-notes-url-prefix "$RELEASE_NOTES_URL_PREFIX" \
            output/archives/arm64

          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST_BIN" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
            --release-notes-url-prefix "$RELEASE_NOTES_URL_PREFIX" \
            output/archives/x86_64

          mv output/archives/arm64/appcast.xml output/appcast-arm64.xml
          mv output/archives/x86_64/appcast.xml output/appcast-x86_64.xml

          cp output/archives/arm64/*.md output/release-notes/"$TAG"/
          cp output/archives/x86_64/*.md output/release-notes/"$TAG"/

          shasum -a 256 "$ARM_DMG" "$X86_DMG" > output/SHA256SUMS.txt

      - name: Upload review artifact (before publish)
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-metadata-${{ github.event.release.tag_name }}
          path: |
            output/appcast-arm64.xml
            output/appcast-x86_64.xml
            output/SHA256SUMS.txt
            output/changelog
            output/release-notes
          retention-days: 30

  publish-gh-pages:
    if: github.event_name == 'release'
    runs-on: macos-15
    needs: prepare-sparkle-metadata
    environment:
      name: sparkle-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Download review artifact
        uses: actions/download-artifact@v4
        with:
          name: sparkle-metadata-${{ github.event.release.tag_name }}
          path: output

      - name: Publish appcast and changelog to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ -f output/appcast-arm64.xml ]]; then
            SOURCE_DIR="output"
          elif [[ -f output/output/appcast-arm64.xml ]]; then
            SOURCE_DIR="output/output"
          else
            echo "❌ Unable to locate downloaded artifact files."
            find output -maxdepth 4 -type f -print || true
            exit 1
          fi

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            git clone --depth 1 "$REPO_URL" gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          mkdir -p "gh-pages/release-notes/${TAG}" gh-pages/changelog

          cp "$SOURCE_DIR/appcast-arm64.xml" gh-pages/appcast-arm64.xml
          cp "$SOURCE_DIR/appcast-x86_64.xml" gh-pages/appcast-x86_64.xml
          cp "$SOURCE_DIR/SHA256SUMS.txt" "gh-pages/changelog/${TAG}-SHA256SUMS.txt"
          cp "$SOURCE_DIR/changelog/${TAG}.md" "gh-pages/changelog/${TAG}.md"
          cp "$SOURCE_DIR/changelog/latest.md" gh-pages/changelog/latest.md
          cp "$SOURCE_DIR/release-notes/${TAG}/"*.md "gh-pages/release-notes/${TAG}/"

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset=\"utf-8\"><title>SwiftCraftServerLauncher Updates</title></head><body>"
            echo "<h1>SwiftCraftServerLauncher Updates</h1>"
            echo "<ul>"
            echo "<li><a href=\"./appcast-arm64.xml\">appcast-arm64.xml</a></li>"
            echo "<li><a href=\"./appcast-x86_64.xml\">appcast-x86_64.xml</a></li>"
            echo "<li><a href=\"./changelog/latest.md\">latest changelog</a></li>"
            echo "</ul>"
            echo "</body></html>"
          } > gh-pages/index.html

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "chore: publish appcast + changelog for ${TAG}"
          git push origin HEAD:gh-pages
